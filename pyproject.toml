[tool.ruff]
line-length = 120
target-version = "py311"
exclude = ["main.old.py", ".github/"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "N", "SIM", "ARG"]
ignore = ["N802", "N803", "N815", "N816"]

[tool.ruff.lint.per-file-ignores]
"model_configs/*.py" = ["E501", "UP032"]
"utils/mish_mash.py" = ["E701"]

[tool.pytest.ini_options]
testpaths = ["tests"]
