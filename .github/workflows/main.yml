name: 生成每日故事
on:
  schedule:
  - cron: '0 23 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.MY_API_KEY }}
      API_KEY_DS: ${{ secrets.MY_API_KEY_DS }}
      API_KEY_KIMI: ${{ secrets.MY_API_KEY_KIMI }}
      API_KEY_DOUBAO: ${{ secrets.MY_API_KEY_DOUBAO }}
      API_KEY_QWEN: ${{ secrets.MY_API_KEY_QWEN }}
      API_KEY_MODELSCOPE: ${{ secrets.MY_API_KEY_MODELSCOPE }}
      API_KEY_GEMINI: ${{ secrets.MY_API_KEY_GEMINI }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Asia/Shanghai"
      - name: 生成故事
        run: python main.py
      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Add story"
          git push
